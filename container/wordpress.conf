# nginx virtual-host configuration for the Bedrock WordPress installation.
#
# Layout:
#   Document root : /app/web
#   WordPress core: /app/web/wp   (WP_SITEURL path)
#   Custom content: /app/web/app  (plugins, themes, uploads)
#
# HTTPS is terminated by the AWS Lightsail load balancer; this container
# only ever receives plain HTTP.  The X-Forwarded-Proto header is forwarded
# to PHP so WordPress can correctly detect the scheme for redirects and
# canonical URLs.

server {
    listen      80;
    server_name _;

    root  /app/web;
    index index.php;

    # Must match php-fpm's upload_max_filesize / post_max_size.
    client_max_body_size 64m;

    # Standard WordPress permalink rewrite.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Route PHP requests through php-fpm (listening on TCP 127.0.0.1:9000).
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass  127.0.0.1:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SERVER_NAME     $http_host;

        # Forward the originating protocol so config/application.php can
        # set $_SERVER['HTTPS'] = 'on' when the request came in over HTTPS.
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        fastcgi_read_timeout 300;
    }

    # Aggressive caching headers for fingerprinted static assets.
    location ~* \.(css|js|jpg|jpeg|gif|png|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        log_not_found     off;
    }

    # xmlrpc.php is not used; block it to limit attack surface.
    location = /xmlrpc.php {
        deny all;
    }

    # Block hidden files (.htaccess, .env, .git, etc.).
    location ~ /\. {
        deny all;
    }
}
