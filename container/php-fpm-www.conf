; php-fpm www pool configuration for the ootm-wordpress production container.
; This file is placed at /etc/php-fpm.d/www.conf and replaces the distro default.

[www]

; Worker processes run as the nginx user so they can read/write the same
; files as the nginx master (uploads staging directory, opcache, etc.).
user  = nginx
group = nginx

; TCP socket – simpler than a Unix socket in a single-container deployment
; because it avoids socket-file permission issues.
listen = 127.0.0.1:9000

; Dynamic process management: scales between min/max spare workers.
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
pm.max_requests      = 500

; PHP runtime overrides -------------------------------------------------------

; Never display errors to end-users in production.
php_flag[display_errors]  = off
php_admin_flag[log_errors] = on

; Send PHP error logs to stderr so the container runtime captures them.
php_admin_value[error_log] = /dev/stderr

; Upload limits – must align with nginx's client_max_body_size.
php_value[upload_max_filesize] = 64M
php_value[post_max_size]       = 64M

; Memory and execution time appropriate for a WordPress site with image
; processing and S3 uploads via amazon-s3-and-cloudfront.
php_value[memory_limit]       = 256M
php_value[max_execution_time] = 300
